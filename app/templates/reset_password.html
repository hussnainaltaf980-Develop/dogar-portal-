<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password · {{ company_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .grid-bg { background-color: #f3f1fb; background-image: linear-gradient(rgba(99,102,241,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,0.07) 1px, transparent 1px); background-size: 32px 32px; }
    </style>
</head>
<body class="min-h-screen bg-white text-slate-800 flex flex-col">
<div class="flex flex-1 min-h-[calc(100vh-44px)]">
    <div class="hidden md:flex md:w-1/2 grid-bg items-center justify-center">
        <div class="flex flex-col items-center text-center px-8">
            <img src="/static/img/logo.png" alt="{{ company_name }}" class="w-56 h-auto mb-6 object-contain">
            <div class="text-2xl font-bold text-slate-800 tracking-tight">{{ company_name }}</div>
            <div class="text-sm text-slate-500 mt-1">{{ company_tagline }}</div>
        </div>
    </div>
    <div class="w-full md:w-1/2 flex flex-col items-center justify-center px-6 sm:px-12 py-10">
        <div class="w-full max-w-sm">
            <h1 class="text-2xl font-bold text-slate-800 mb-1">Reset Password</h1>
            <p class="text-sm text-slate-500 mb-7">Choose a new password for your account.</p>

            <form id="resetForm" class="space-y-4">
                <input type="hidden" id="token" value="{{ token }}">
                <div>
                    <label class="block text-[13px] font-medium text-slate-700 mb-1.5">New Password</label>
                    <div class="relative">
                        <input type="password" id="newPwd" required minlength="6"
                               class="w-full px-3 py-2.5 pr-10 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="At least 6 characters">
                        <button type="button" id="tog1" tabindex="-1" class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 p-1.5"><i class="fa-regular fa-eye" id="tog1Ico"></i></button>
                    </div>
                </div>
                <div>
                    <label class="block text-[13px] font-medium text-slate-700 mb-1.5">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirmPwd" required minlength="6"
                               class="w-full px-3 py-2.5 pr-10 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="Re-enter password">
                        <button type="button" id="tog2" tabindex="-1" class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 p-1.5"><i class="fa-regular fa-eye" id="tog2Ico"></i></button>
                    </div>
                </div>
                <div id="msg" class="hidden text-[13px] rounded-lg p-3"></div>
                <button type="submit" id="submitBtn"
                        class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-semibold text-sm rounded-lg">
                    Update Password
                </button>
                <div class="text-center text-[13px] text-slate-500 pt-2">
                    <a href="/login" class="text-blue-600 hover:underline font-medium">Back to Sign In</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer class="bg-white border-t border-slate-200 px-6 py-3 text-center text-[12px] text-slate-500">
    &copy; 2025 {{ company_name }} &middot; Powered by <span class="font-semibold text-slate-700">HussnainTechVertex Pvt Ltd.</span>
</footer>
<script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
<script>
function bindToggle(btnId, icoId, inputId) {
    document.getElementById(btnId).addEventListener('click', () => {
        const inp = document.getElementById(inputId);
        const showing = inp.type === 'text';
        inp.type = showing ? 'password' : 'text';
        document.getElementById(icoId).className = showing ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
    });
}
bindToggle('tog1','tog1Ico','newPwd');
bindToggle('tog2','tog2Ico','confirmPwd');

document.getElementById('resetForm').addEventListener('submit', async e => {
    e.preventDefault();
    const newPwd = document.getElementById('newPwd').value;
    const confirmPwd = document.getElementById('confirmPwd').value;
    const token = document.getElementById('token').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');
    msg.classList.add('hidden');
    if (newPwd !== confirmPwd) {
        msg.className = 'text-[13px] rounded-lg p-3 bg-rose-50 border border-rose-200 text-rose-800';
        msg.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Passwords do not match.';
        msg.classList.remove('hidden'); return;
    }
    btn.disabled = true; btn.textContent = 'Updating...';
    try {
        const { data } = await axios.post('/api/auth/reset-password', { token, new_password: newPwd });
        msg.className = 'text-[13px] rounded-lg p-3 bg-emerald-50 border border-emerald-200 text-emerald-800';
        msg.innerHTML = '<i class="fa-solid fa-check-circle"></i> ' + data.message;
        msg.classList.remove('hidden');
        setTimeout(() => { window.location = '/login'; }, 1800);
    } catch (err) {
        msg.className = 'text-[13px] rounded-lg p-3 bg-rose-50 border border-rose-200 text-rose-800';
        msg.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> ' + ((err.response && err.response.data && err.response.data.detail) || 'Failed.');
        msg.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Update Password';
    }
});
</script>
</body>
</html>
