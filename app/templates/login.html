<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In · {{ company_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Eagerly preload both panels so there is zero blank-flash on first paint -->
    <link rel="preload" as="image" href="/static/img/login/office-left.jpg">
    <link rel="preload" as="image" href="/static/img/login/office-right.jpg">

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            margin: 0;
        }

        /* ── LEFT PANEL ──────────────────────────────────────────────────── */
        /* Solid corporate-blue fallback → image paints on top once loaded.
           No more blank white flash. */
        .panel-left {
            position: relative;
            /* Instant solid fallback colour — matches the lobby photo tones */
            background-color: #c8d6e0;
            background-image: url('/static/img/login/office-left.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }
        /* Branded gradient tint + right-edge bleed into right panel */
        .panel-left::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(16, 36, 60, 0.12) 0%,
                rgba(16, 36, 60, 0.00) 60%,
                rgba(245,247,250, 0.50) 100%
            );
            pointer-events: none;
        }
        /* Branded badge bottom-left */
        .panel-left .brand-badge {
            position: absolute;
            bottom: 28px;
            left: 32px;
            z-index: 2;
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.10);
        }

        /* ── RIGHT PANEL ─────────────────────────────────────────────────── */
        /* Same instant solid fallback so right side is never blank white */
        .panel-right {
            position: relative;
            background-color: #e8edf3;
            background-image: url('/static/img/login/office-right.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }
        /* Frosted-glass wash — keeps sign-in card the focal point */
        .panel-right::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(240, 244, 248, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            pointer-events: none;
        }
        /* Left-edge fade so the two panels flow into each other */
        .panel-right::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(270deg, rgba(255,255,255,0.00) 70%, rgba(245,247,250,0.50) 100%);
            pointer-events: none;
        }

        /* ── SIGN-IN CARD ────────────────────────────────────────────────── */
        .signin-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(18px) saturate(130%);
            -webkit-backdrop-filter: blur(18px) saturate(130%);
            border: 1px solid rgba(255, 255, 255, 0.90);
            box-shadow:
                0 2px 4px rgba(15,23,42,0.04),
                0 8px 24px rgba(15,23,42,0.10),
                0 24px 56px rgba(15,23,42,0.10);
            border-radius: 20px;
        }

        /* ── INPUT FIELDS ────────────────────────────────────────────────── */
        .field-input {
            background: rgba(241,245,249,0.70);
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
        }
        .field-input:focus {
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        /* ── SIGN-IN BUTTON ──────────────────────────────────────────────── */
        .btn-signin {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            box-shadow: 0 4px 14px rgba(37,99,235,0.35);
            transition: filter 0.15s, transform 0.12s, box-shadow 0.15s;
        }
        .btn-signin:hover:not(:disabled) {
            filter: brightness(1.08);
            box-shadow: 0 6px 18px rgba(37,99,235,0.40);
        }
        .btn-signin:active:not(:disabled) { transform: translateY(1px); }

        /* ── MOBILE BANNER ───────────────────────────────────────────────── */
        /* On small screens show a slim branded top banner instead of left panel */
        @media (max-width: 767px) {
            .mobile-banner {
                background-color: #1e3a5f;
                background-image: url('/static/img/login/office-left.jpg');
                background-size: cover;
                background-position: top center;
                min-height: 160px;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
            }
            .mobile-banner::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(16,36,60,0.45);
            }
            .mobile-banner .logo-wrap { position: relative; z-index: 2; }
        }

        /* ── FOOTER ──────────────────────────────────────────────────────── */
        .footer-bar {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid rgba(226,232,240,0.80);
        }

        /* ── DIVIDER ─────────────────────────────────────────────────────── */
        .divider { height: 1px; background: linear-gradient(90deg, transparent, #e2e8f0, transparent); }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col">

<!-- ══════════════════════════════════════════════════════
     SPLIT LAYOUT
     LEFT  = Office lobby with Dogar logo on glass wall
     RIGHT = Frosted-glass reception backdrop + Sign-In card
     ══════════════════════════════════════════════════════ -->
<div class="flex flex-1 min-h-[calc(100vh-44px)]">

    <!-- ── LEFT PANEL (desktop only) ──────────────────── -->
    <div class="hidden md:block md:w-1/2 panel-left">
        <!-- Branded bottom badge -->
        <div class="brand-badge">
            <img src="/static/img/logo-sm.png" alt="{{ company_name }}" class="h-9 w-auto object-contain">
            <div>
                <div class="text-[13px] font-bold text-slate-800 leading-tight">{{ company_name }}</div>
                <div class="text-[11px] text-slate-500">Overseas Employment Portal</div>
            </div>
        </div>
    </div>

    <!-- ── RIGHT PANEL ────────────────────────────────── -->
    <div class="w-full md:w-1/2 panel-right flex flex-col">

        <!-- Mobile top banner (replaces left panel on small screens) -->
        <div class="mobile-banner md:hidden">
            <div class="logo-wrap text-center">
                <img src="/static/img/logo.png" alt="{{ company_name }}" class="w-28 h-auto object-contain drop-shadow-lg mx-auto">
            </div>
        </div>

        <!-- Card centred in right panel -->
        <div class="flex-1 flex items-center justify-center px-5 sm:px-10 py-10">
            <div class="signin-card w-full max-w-[420px] px-8 py-9">

                <!-- Header -->
                <div class="mb-7">
                    <div class="flex items-center gap-2.5 mb-4">
                        <div class="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center shadow-md shadow-blue-600/30">
                            <i class="fa-solid fa-right-to-bracket text-white text-sm"></i>
                        </div>
                        <span class="text-[11.5px] font-semibold text-blue-600 tracking-wide uppercase">Secure Sign In</span>
                    </div>
                    <h1 class="text-[26px] leading-tight font-bold text-slate-900">Welcome back</h1>
                    <p class="text-[13.5px] text-slate-500 mt-1">Enter your credentials to access your account</p>
                </div>

                <div class="divider mb-6"></div>

                <!-- Form -->
                <form id="loginForm" class="space-y-5" autocomplete="on">

                    <!-- Email / Username -->
                    <div>
                        <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">
                            Email Address
                        </label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                                <i class="fa-regular fa-envelope text-[13px]"></i>
                            </span>
                            <input type="text" id="username" required autocomplete="username"
                                   class="field-input w-full pl-10 pr-4 py-2.5 text-sm border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500"
                                   placeholder="you@company.com">
                        </div>
                    </div>

                    <!-- Password -->
                    <div>
                        <div class="flex items-center justify-between mb-1.5">
                            <label class="text-[13px] font-semibold text-slate-700">Password</label>
                            <a href="/forgot-password"
                               class="text-[12.5px] text-blue-600 hover:text-blue-700 hover:underline font-medium">
                                Forgot password?
                            </a>
                        </div>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                                <i class="fa-solid fa-lock text-[13px]"></i>
                            </span>
                            <input type="password" id="password" required autocomplete="current-password"
                                   class="field-input w-full pl-10 pr-11 py-2.5 text-sm border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500"
                                   placeholder="••••••••">
                            <button type="button" id="togglePwd" tabindex="-1"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 p-1 rounded"
                                    title="Show / hide password">
                                <i class="fa-regular fa-eye text-[13px]" id="togglePwdIcon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember me -->
                    <label class="flex items-center gap-2.5 text-[13px] text-slate-600 cursor-pointer select-none">
                        <input type="checkbox" id="rememberMe"
                               class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        Keep me signed in
                    </label>

                    <!-- Error alert -->
                    <div id="loginError" class="hidden text-[13px] text-red-700 bg-red-50 border border-red-200 rounded-xl p-3 flex items-start gap-2">
                        <i class="fa-solid fa-circle-exclamation mt-0.5 shrink-0"></i>
                        <span id="loginErrorText">Login failed</span>
                    </div>

                    <!-- Submit -->
                    <button type="submit" id="loginBtn"
                            class="btn-signin w-full py-3 text-white font-semibold text-sm rounded-xl disabled:opacity-60 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-right-to-bracket mr-1.5"></i> Sign In
                    </button>

                    <!-- Support link -->
                    <div class="text-center text-[12.5px] text-slate-500">
                        Need help?
                        <a href="/contact-support" class="text-blue-600 hover:underline font-semibold ml-0.5">
                            Contact Support
                        </a>
                    </div>

                    <!-- Card footer -->
                    <div class="divider"></div>
                    <div class="flex items-center justify-between text-[11.5px] text-slate-400 pt-1">
                        <a href="/privacy" class="hover:text-slate-600 transition-colors">Privacy Policy</a>
                        <span class="inline-flex items-center gap-1">
                            <span>Built by</span>
                            <img src="/static/img/dev_logo_micro.png" alt="HussnainTechVertex" class="h-3.5 w-3.5 object-contain">
                            <span class="font-semibold text-slate-500">HussnainTechVertex</span>
                        </span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="footer-bar px-6 py-3 flex items-center justify-center gap-2 text-[12px] text-slate-500">
    <span>&copy; 2025 {{ company_name }} &middot; Powered by</span>
    <span class="inline-flex items-center gap-1.5">
        <img src="/static/img/dev_logo_icon.png" alt="HussnainTechVertex" class="h-5 w-5 object-contain"
             style="filter: drop-shadow(0 1px 1px rgba(0,0,0,0.08));">
        <span class="font-semibold text-slate-700">HussnainTechVertex Pvt Ltd.</span>
    </span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
<script>
// Pre-fill remembered username
(function() {
    const remembered = localStorage.getItem('dtc_remember_username');
    if (remembered) {
        document.getElementById('username').value = remembered;
        document.getElementById('rememberMe').checked = true;
    }
})();

// Toggle password visibility
const pwdInput = document.getElementById('password');
const toggleBtn = document.getElementById('togglePwd');
const toggleIcon = document.getElementById('togglePwdIcon');
toggleBtn.addEventListener('click', () => {
    const showing = pwdInput.type === 'text';
    pwdInput.type = showing ? 'password' : 'text';
    toggleIcon.className = showing ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('rememberMe').checked;
    const errorBox = document.getElementById('loginError');
    const errorText = document.getElementById('loginErrorText');
    const btn = document.getElementById('loginBtn');
    errorBox.classList.add('hidden');
    btn.disabled = true; btn.textContent = 'Signing in...';
    try {
        const res = await axios.post('/api/auth/login', { username, password });
        if (remember) {
            localStorage.setItem('dtc_remember_username', username);
        } else {
            localStorage.removeItem('dtc_remember_username');
        }
        localStorage.setItem('user', JSON.stringify(res.data.user));
        localStorage.setItem('access_token', res.data.access_token);
        document.cookie = "access_token=" + res.data.access_token + "; path=/; max-age=86400; SameSite=None; Secure";
        window.location.href = '/dashboard?token=' + res.data.access_token;
    } catch (err) {
        errorText.textContent = err.response?.data?.detail || 'Invalid username or password.';
        errorBox.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Sign In';
    }
});
</script>
</body>
</html>
