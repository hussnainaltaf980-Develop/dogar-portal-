<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password · {{ company_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .grid-bg { background-color: #f3f1fb; background-image: linear-gradient(rgba(99,102,241,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,0.07) 1px, transparent 1px); background-size: 32px 32px; }
    </style>
</head>
<body class="min-h-screen bg-white text-slate-800 flex flex-col">
<div class="flex flex-1 min-h-[calc(100vh-44px)]">
    <div class="hidden md:flex md:w-1/2 grid-bg items-center justify-center">
        <div class="flex flex-col items-center text-center px-8">
            <img src="/static/img/logo.png" alt="{{ company_name }}" class="w-56 h-auto mb-6 object-contain">
            <div class="text-2xl font-bold text-slate-800 tracking-tight">{{ company_name }}</div>
            <div class="text-sm text-slate-500 mt-1">{{ company_tagline }}</div>
        </div>
    </div>
    <div class="w-full md:w-1/2 flex flex-col items-center justify-center px-6 sm:px-12 py-10">
        <div class="w-full max-w-sm">
            <div class="md:hidden flex justify-center mb-6">
                <img src="/static/img/logo.png" alt="Logo" class="w-28 h-auto object-contain">
            </div>
            <h1 class="text-2xl font-bold text-slate-800 mb-1">Forgot Password</h1>
            <p class="text-sm text-slate-500 mb-7">Enter your account email and we'll generate a one-time reset link.</p>

            <form id="forgotForm" class="space-y-4">
                <div>
                    <label class="block text-[13px] font-medium text-slate-700 mb-1.5">Email Address</label>
                    <input type="email" id="email" required autocomplete="email"
                           class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="you@example.com">
                </div>
                <div id="msg" class="hidden text-[13px] rounded-lg p-3"></div>
                <div id="resetLinkBox" class="hidden bg-blue-50 border border-blue-200 rounded-lg p-3 text-[13px]">
                    <div class="font-semibold text-blue-800 mb-1.5"><i class="fa-solid fa-link"></i> Your reset link (valid 30 min):</div>
                    <a id="resetLink" href="#" class="text-blue-700 hover:underline break-all font-mono text-xs"></a>
                </div>
                <button type="submit" id="submitBtn"
                        class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-semibold text-sm rounded-lg">
                    Send Reset Link
                </button>
                <div class="text-center text-[13px] text-slate-500 pt-2">
                    Remembered? <a href="/login" class="text-blue-600 hover:underline font-medium">Back to Sign In</a>
                </div>
                <div class="text-center text-[12.5px] text-slate-500">
                    Need help? <a href="/contact-support" class="text-blue-600 hover:underline font-medium">Contact Support</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer class="bg-white border-t border-slate-200 px-6 py-3 text-center text-[12px] text-slate-500">
    &copy; 2025 {{ company_name }} &middot; Powered by <span class="font-semibold text-slate-700">HussnainTechVertex Pvt Ltd.</span>
</footer>
<script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');
    const box = document.getElementById('resetLinkBox');
    msg.classList.add('hidden'); box.classList.add('hidden');
    btn.disabled = true; btn.textContent = 'Sending...';
    try {
        const { data } = await axios.post('/api/auth/forgot-password', { email });
        msg.className = 'text-[13px] rounded-lg p-3 bg-emerald-50 border border-emerald-200 text-emerald-800';
        msg.innerHTML = '<i class="fa-solid fa-check-circle"></i> ' + (data.message || 'Reset link sent.');
        msg.classList.remove('hidden');
        if (data.reset_url) {
            document.getElementById('resetLink').textContent = window.location.origin + data.reset_url;
            document.getElementById('resetLink').href = data.reset_url;
            box.classList.remove('hidden');
        }
    } catch (err) {
        msg.className = 'text-[13px] rounded-lg p-3 bg-rose-50 border border-rose-200 text-rose-800';
        msg.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> ' + ((err.response && err.response.data && err.response.data.detail) || 'Failed.');
        msg.classList.remove('hidden');
    } finally {
        btn.disabled = false; btn.textContent = 'Send Reset Link';
    }
});
</script>
</body>
</html>
